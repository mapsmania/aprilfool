<!DOCTYPE html>
<html lang="en">
<head>
    <title>Manhattan Artistic Mask</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty', 
        center: [-73.977, 40.783], // Manhattan center
        zoom: 12
    });

    map.on('load', () => {
        // 1. Add your Manhattan GeoJSON source
        map.addSource('manhattan-boundary', {
            'type': 'geojson',
            'data': 'manhattan.geojson' // Ensure this file is in your local directory
        });

        // 2. Add a Fill Layer (The "Stencil" area)
        map.addLayer({
            'id': 'manhattan-fill',
            'type': 'fill',
            'source': 'manhattan-boundary',
            'layout': {},
            'paint': {
                'fill-color': '#088', // Artistic teal color
                'fill-opacity': 0.4,
                'fill-outline-color': '#000'
            }
        });

        // 3. Optional: Add a Line Layer for a sharp river edge
        map.addLayer({
            'id': 'manhattan-outline',
            'type': 'line',
            'source': 'manhattan-boundary',
            'layout': {},
            'paint': {
                'line-color': '#000',
                'line-width': 2
            }
        });
    });
</script>

</body>
</html>
