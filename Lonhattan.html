<!DOCTYPE html>
<html>
<head>
    <title>Lonhattan Collage</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        .map-container { position: absolute; top: 0; bottom: 0; width: 100%; }
        #london-map { z-index: 1; } /* The Background */
        #nyc-map { z-index: 2; pointer-events: none; } /* The Mask (Passes clicks through) */
    </style>
</head>
<body>

<div id="london-map" class="map-container"></div>
<div id="nyc-map" class="map-container"></div>

<script>
    // 1. Initialize London (Background)
    const londonMap = new maplibregl.Map({
        container: 'london-map',
        style: 'https://tiles.openfreemap.org/styles/dark', // Dark makes the "hole" pop
        center: [-0.1276, 51.5072],
        zoom: 13
    });

    // 2. Initialize NYC (Top Layer)
    const nycMap = new maplibregl.Map({
        container: 'nyc-map',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: [-73.977, 40.783],
        zoom: 13,
        interactive: false // It follows London's movements
    });

    // Helper to create the inverse "Hole"
    function createInverseMask(manhattanGeojson) {
        const worldOuter = [[-180, 90], [180, 90], [180, -90], [-180, -90], [-180, 90]];
        const manhattanCoords = manhattanGeojson.features[0].geometry.coordinates[0];
        
        return {
            "type": "FeatureCollection",
            "features": [{
                "type": "Feature",
                "geometry": {
                    "type": "Polygon",
                    "coordinates": [worldOuter, manhattanCoords]
                }
            }]
        };
    }

    // Sync London movements to NYC
    londonMap.on('move', () => {
        const center = londonMap.getCenter();
        const zoom = londonMap.getZoom();
        // Shift NYC to stay centered relative to London
        // (You can add an offset here if you want to align specific streets)
        nycMap.jumpTo({
            center: [-73.977 + (center.lng - (-0.1276)), 40.783 + (center.lat - 51.5072)],
            zoom: zoom,
            bearing: londonMap.getBearing(),
            pitch: londonMap.getPitch()
        });
    });

    fetch('manhattan.geojson')
        .then(res => res.json())
        .then(data => {
            nycMap.on('load', () => {
                nycMap.addSource('mask', {
                    'type': 'geojson',
                    'data': createInverseMask(data)
                });

                // This layer covers EVERYTHING except Manhattan
                nycMap.addLayer({
                    'id': 'hole-layer',
                    'type': 'fill',
                    'source': 'mask',
                    'paint': {
                        'fill-color': '#f8f4f0', // Match the NYC map background color
                        'fill-opacity': 1
                    }
                });
            });
        });
</script>
</body>
</html>
