<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lonhattan: Artistic Fusion</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #202020; }
        #map-visible { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        /* The London map stays hidden in the background */
        #map-hidden { position: absolute; width: 1024px; height: 1024px; top: -2000px; }
    </style>
</head>
<body>

<div id="map-visible"></div>
<div id="map-hidden"></div>

<script>
    const NYC_CENTER = [-73.977, 40.783];
    const LONDON_CENTER = [-0.1276, 51.5072];

    const londonMap = new maplibregl.Map({
        container: 'map-hidden',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: LONDON_CENTER,
        zoom: 13,
        interactive: false,
        preserveDrawingBuffer: true
    });

    const map = new maplibregl.Map({
        container: 'map-visible',
        style: 'https://tiles.openfreemap.org/styles/liberty', 
        center: NYC_CENTER,
        zoom: 13
    });

    map.on('load', () => {
        // Load the Manhattan shape
        map.addSource('manhattan-mask', {
            'type': 'geojson',
            'data': 'manhattan.geojson'
        });

        // Use the hidden London canvas as a source
        map.addSource('london-canvas', {
            type: 'canvas',
            canvas: londonMap.getCanvas(),
            animate: true,
            // These coordinates pin the "London Tile" over the NYC area
            coordinates: [
                [-74.1, 40.85], 
                [-73.8, 40.85],
                [-73.8, 40.70],
                [-74.1, 40.70]
            ]
        });

        // FIX 2: Added 'fill-mask' logic
        // We use the Manhattan GeoJSON to "clip" the London canvas
        map.addLayer({
            'id': 'london-layer',
            'type': 'fill',
            'source': 'manhattan-mask',
            'paint': {
                'fill-pattern': 'london-canvas-img' // We'll update this live
            }
        });

        // Simpler approach for the artistic effect: 
        // Just overlay the London canvas and use Manhattan as a clip-path
        map.addLayer({
            'id': 'london-overlay',
            'type': 'raster',
            'source': 'london-canvas',
            'paint': { 'raster-opacity': 1.0 }
        });

        // To keep the rivers, we keep the NYC water layers ON TOP
        // Usually 'water' or 'waterway' in Liberty style
    });

    // FIX 3: Robust Syncing
    map.on('move', () => {
        const nycPos = map.getCenter();
        const latDelta = nycPos.lat - NYC_CENTER[1];
        const lonDelta = nycPos.lng - NYC_CENTER[0];

        londonMap.jumpTo({
            center: [LONDON_CENTER[0] + lonDelta, LONDON_CENTER[1] + latDelta],
            zoom: map.getZoom(),
            bearing: map.getBearing(),
            pitch: map.getPitch()
        });
    });
</script>
</body>
</html>
