<!DOCTYPE html>
<html>
<head>
    <title>Lonhattan Collage</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        .map-container { position: absolute; top: 0; bottom: 0; width: 100%; }
        #london-map { z-index: 1; } 
        #nyc-map { z-index: 2; pointer-events: none; } 
    </style>
</head>
<body>

<div id="london-map" class="map-container"></div>
<div id="nyc-map" class="map-container"></div>

<script>
    // Config
    const NYC_BASE = [-73.977, 40.783];
    const LDN_BASE = [-0.1276, 51.5072];

    const londonMap = new maplibregl.Map({
        container: 'london-map',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: LDN_BASE,
        zoom: 13
    });

    const nycMap = new maplibregl.Map({
        container: 'nyc-map',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: NYC_BASE,
        zoom: 13,
        interactive: false
    });

    // The "Inverse" Logic: A giant box with Manhattan cut out
    function createMask(geojson) {
        const world = [[-180, 90], [180, 90], [180, -90], [-180, -90], [-180, 90]];
        // Extract coordinates. Handling both Polygon and MultiPolygon
        let coords = geojson.features[0].geometry.coordinates;
        if (geojson.features[0].geometry.type === "Polygon") {
            return {
                "type": "Feature",
                "geometry": { "type": "Polygon", "coordinates": [world, coords[0]] }
            };
        } else {
            // MultiPolygon handling
            return {
                "type": "Feature",
                "geometry": { "type": "Polygon", "coordinates": [world, ...coords.map(c => c[0])] }
            };
        }
    }

    londonMap.on('move', () => {
        const c = londonMap.getCenter();
        const z = londonMap.getZoom();
        // Sync NYC map to follow London movements
        nycMap.jumpTo({
            center: [NYC_BASE[0] + (c.lng - LDN_BASE[0]), NYC_BASE[1] + (c.lat - LDN_BASE[1])],
            zoom: z,
            bearing: londonMap.getBearing(),
            pitch: londonMap.getPitch()
        });
    });

    fetch('manhattan.geojson')
        .then(res => res.json())
        .then(data => {
            nycMap.on('load', () => {
                // Add the NYC base layers first
                // Then add the MASK that hides NYC *inside* Manhattan
                nycMap.addSource('manhattan-hole', {
                    'type': 'geojson',
                    'data': data // The actual shape
                });

                // Instead of an inverse mask, we use a "Destination-Out" style trick
                // We'll fill the Manhattan shape with a color that acts as a "Hole"
                // In standard MapLibre, the easiest way is to make the fill transparent
                // but we need to hide the underlying NYC map layers.
                
                // REVISED STRATEGY:
                // We hide the NYC layers ONLY within the Manhattan geometry.
                const layers = nycMap.getStyle().layers;
                layers.forEach(layer => {
                    if (layer.id !== 'background') {
                        nycMap.setFilter(layer.id, [
                            "!", ["within", data.features[0].geometry]
                        ]);
                    }
                });
            });
        });
</script>
</body>
</html>
