<!DOCTYPE html>
<html lang="en">
<head>
    <title>Artistic Sync: London in Manhattan</title>
    <meta charset="utf-8">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"></script>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #map-visible { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        /* Keep the London map hidden but active */
        #map-hidden { position: absolute; width: 512px; height: 512px; top: -1000px; visibility: hidden; }
    </style>
</head>
<body>

<div id="map-visible"></div>
<div id="map-hidden"></div>

<script>
    // Configuration: The "Anchor" points for the swap
    const NYC_CENTER = [-74.006, 40.712];
    const LONDON_CENTER = [-0.1276, 51.5072];

    // 1. Initialize the Hidden London Map
    const londonMap = new maplibregl.Map({
        container: 'map-hidden',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: LONDON_CENTER,
        zoom: 13,
        interactive: false,
        preserveDrawingBuffer: true // Required to read the canvas
    });

    // 2. Initialize the Visible NYC Map
    const map = new maplibregl.Map({
        container: 'map-visible',
        style: 'https://tiles.openfreemap.org/styles/liberty', 
        center: NYC_CENTER,
        zoom: 13
    });

    map.on('load', () => {
        // Add Manhattan GeoJSON
        map.addSource('manhattan-mask', {
            'type': 'geojson',
            'data': 'manhattan.geojson' // Your file
        });

        // Add the Hidden Canvas as a Source
        map.addSource('london-canvas-source', {
            type: 'canvas',
            canvas: londonMap.getCanvas(), // Pipe the London canvas here
            animate: true,
            coordinates: [
                [-74.047, 40.800], // Adjust these 4 points to "stretch"
                [-73.906, 40.800], // the London texture over Manhattan
                [-73.906, 40.680],
                [-74.047, 40.680]
            ]
        });

        // Layer the London "Skin" onto Manhattan
        map.addLayer({
            'id': 'london-layer',
            'type': 'raster',
            'source': 'london-canvas-source'
        }, 'waterway-name'); // Place it below labels for extra style
    });

    // 3. THE SYNC LOGIC
    // When the user moves the NYC map, we move the London map by the same delta
    map.on('move', () => {
        const nycPos = map.getCenter();
        const nycZoom = map.getZoom();

        // Calculate the relative offset
        const latDelta = nycPos.lat - NYC_CENTER[1];
        const lonDelta = nycPos.lng - NYC_CENTER[0];

        // Move the hidden London camera
        londonMap.jumpTo({
            center: [LONDON_CENTER[0] + lonDelta, LONDON_CENTER[1] + latDelta],
            zoom: nycZoom,
            bearing: map.getBearing(),
            pitch: map.getPitch()
        });
    });
</script>
</body>
</html>
