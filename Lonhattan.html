<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Manhattan Hole Map</title>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;

    /* THIS is what shows through the hole */
    background: radial-gradient(circle at center,
      #ffd36e 0%,
      #ff7a3c 40%,
      #2b0b0b 100%);
  }

  #map {
    position: absolute;
    inset: 0;
  }
</style>
</head>

<body>

<div id="map"></div>

<script>
const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [-73.971, 40.783],
  zoom: 11.5
});

/* --- YOUR MANHATTAN GEOJSON --- */

      ]]
    }
  }]
};

function updateClip() {
  const coords = manhattan.features[0].geometry.coordinates[0];

  const pts = coords.map(c => {
    const p = map.project(c);
    return `${p.x}px ${p.y}px`;
  });

  // Big screen rectangle (must be larger than viewport)
  const w = map.getCanvas().width;
  const h = map.getCanvas().height;

  const outer = [
    `0px 0px`,
    `${w}px 0px`,
    `${w}px ${h}px`,
    `0px ${h}px`,
    `0px 0px`
  ];

  // IMPORTANT: reverse winding creates a hole
  const clip = `polygon(
    ${outer.join(",")},
    ${pts.slice().reverse().join(",")}
  )`;

  map.getCanvas().style.clipPath = clip;
  map.getCanvas().style.webkitClipPath = clip;
}

map.on("load", () => {
  updateClip();
});

map.on("move", updateClip);
map.on("zoom", updateClip);
map.on("rotate", updateClip);
map.on("pitch", updateClip);
</script>

</html>
