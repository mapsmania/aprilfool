<!DOCTYPE html>
<html>
<head>
    <title>Lonhattan Fusion</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        .map-container { position: absolute; top: 0; bottom: 0; width: 100%; }
        #london-map { z-index: 1; } 
        /* Crucial: nyc-map must have a transparent background */
        #nyc-map { z-index: 2; pointer-events: none; background: transparent !important; } 
    </style>
</head>
<body>

<div id="london-map" class="map-container"></div>
<div id="nyc-map" class="map-container"></div>

<script>
    const NYC_BASE = [-73.977, 40.783];
    const LDN_BASE = [-0.1276, 51.5072];

    const londonMap = new maplibregl.Map({
        container: 'london-map',
        style: 'https://tiles.openfreemap.org/styles/dark', // Dark makes London look distinct
        center: LDN_BASE,
        zoom: 13
    });

    const nycMap = new maplibregl.Map({
        container: 'nyc-map',
        style: 'https://tiles.openfreemap.org/styles/liberty',
        center: NYC_BASE,
        zoom: 13,
        interactive: false,
        // This tells the browser to allow transparency in the map canvas
        clearColor: [0, 0, 0, 0] 
    });

    // Sync maps
    londonMap.on('move', () => {
        const c = londonMap.getCenter();
        const z = londonMap.getZoom();
        nycMap.jumpTo({
            center: [NYC_BASE[0] + (c.lng - LDN_BASE[0]), NYC_BASE[1] + (c.lat - LDN_BASE[1])],
            zoom: z,
            bearing: londonMap.getBearing(),
            pitch: londonMap.getPitch()
        });
    });

    async function applyHole() {
        const res = await fetch('manhattan.geojson');
        const data = await res.json();
        const geom = data.features[0].geometry;

        nycMap.on('style.load', () => {
            // 1. Kill the background
            if (nycMap.getLayer('background')) nycMap.removeLayer('background');
            
            // 2. Hide NYC data inside the Manhattan shape
            const layers = nycMap.getStyle().layers;
            layers.forEach(l => {
                nycMap.setFilter(l.id, ["!", ["within", geom]]);
            });
        });
    }

    applyHole();
</script>
</body>
</html>
